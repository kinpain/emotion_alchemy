<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>감정 연금술</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#10024;</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #020208;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 20px 12px 40px;
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  -webkit-tap-highlight-color: transparent;
}
.game {
  width: 100%; max-width: 660px;
  background: #060611; border-radius: 18px;
  overflow: hidden; position: relative; border: 0.5px solid #1A1A35;
}
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px 14px; border-bottom: 0.5px solid #161630;
}
.title { font-size: 16px; font-weight: 600; color: #E0E0F5; letter-spacing: -0.3px; }
.subtitle { font-size: 11px; color: #50507A; margin-top: 3px; line-height: 1.4; }
.progress-area { text-align: right; }
.count { font-size: 15px; font-weight: 600; color: #E0E0F5; margin-bottom: 5px; }
.count span { color: #38385A; font-weight: 400; }
.progress-track { width: 72px; height: 3px; background: #161630; border-radius: 2px; margin: 0 0 6px auto; }
.progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg,#534AB7,#D4537E); transition: width .6s ease; }
.reset-btn { font-size: 10px; color: #2A2A50; background: none; border: none; cursor: pointer; font-family: inherit; }
.reset-btn:hover { color: #55557A; }
.grid {
  display: flex; flex-wrap: wrap;
  gap: 14px 2px; padding: 18px 12px 10px;
  min-height: 250px; align-content: flex-start;
}
.orb-wrapper {
  width: 78px; text-align: center; cursor: pointer;
  user-select: none; -webkit-user-select: none;
  animation: ea-float var(--fdur, 3.5s) ease-in-out var(--fdly, 0s) infinite;
}
.orb-wrapper:active { opacity: 0.75; }
.orb-circle {
  width: 52px; height: 52px; border-radius: 50%;
  margin: 0 auto 7px; transition: transform .15s, box-shadow .15s; cursor: pointer;
}
.orb-name { font-size: 11px; line-height: 1.2; color: #5A5A88; transition: color .15s; }
.orb-stars { font-size: 8px; color: #262648; margin-top: 2px; letter-spacing: 1px; }
.orb-placeholder { width: 78px; text-align: center; opacity: .16; pointer-events: none; }
.orb-placeholder-circle {
  width: 52px; height: 52px; border-radius: 50%;
  border: 1.5px dashed #252548; margin: 0 auto 7px;
  display: flex; align-items: center; justify-content: center;
}
.orb-placeholder-circle span { font-size: 22px; color: #252548; }
.orb-placeholder-name { font-size: 11px; color: #252548; }
.hint-bar {
  margin: 0 14px 12px; padding: 10px 14px;
  background: #0C0C22; border: 0.5px solid #161630;
  border-radius: 10px; display: flex; align-items: center;
  gap: 8px; min-height: 38px;
}
#hint-text { font-size: 12px; color: #50507A; line-height: 1.5; flex: 1; transition: color .3s; }
.action-btn {
  font-size: 11px; color: #3A3A60; background: none;
  border: 0.5px solid #161630; border-radius: 6px; padding: 4px 9px;
  cursor: pointer; white-space: nowrap; font-family: inherit;
  flex-shrink: 0; transition: color .15s, border-color .15s;
}
.action-btn:hover { color: #7070A0; border-color: #2A2A50; }
.level-dots { display: flex; justify-content: center; gap: 20px; padding: 0 14px 20px; }
.level-section { text-align: center; }
.level-label { font-size: 10px; color: #242448; margin-bottom: 6px; transition: color .3s; }
.level-label.active { color: #50507A; }
.dots-row { display: flex; gap: 3px; justify-content: center; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #161630; transition: background .45s, box-shadow .45s; }
.rare-overlay {
  position: absolute; inset: 0; background: rgba(3,3,14,.95);
  display: none; align-items: center; justify-content: center;
  z-index: 99; cursor: pointer;
}
.rare-content { text-align: center; padding: 32px; animation: ea-pop .5s cubic-bezier(.34,1.56,.64,1) .1s both; }
.rare-orb-el { width: 88px; height: 88px; border-radius: 50%; margin: 0 auto 20px; }
.rare-badge { font-size: 11px; letter-spacing: 2px; font-weight: 600; margin-bottom: 10px; }
.rare-name-el { font-size: 28px; font-weight: 600; color: #EAEAFF; margin-bottom: 12px; letter-spacing: -.5px; }
.rare-desc-el { font-size: 13px; color: #6060A0; line-height: 1.9; max-width: 260px; margin: 0 auto 28px; }
.rare-close { font-size: 11px; color: #282848; }
.complete-banner {
  display: none; margin: 0 14px 14px; padding: 12px 16px;
  background: linear-gradient(135deg,#0E0E2A,#1A1040);
  border: 0.5px solid #534AB7; border-radius: 10px; text-align: center;
}
.complete-banner .ct { font-size: 13px; font-weight: 600; color: #AFA9EC; margin-bottom: 4px; }
.complete-banner .cs { font-size: 11px; color: #55557A; }
@keyframes ea-float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
@keyframes ea-pop {
  0%{transform:scale(.05) rotate(-18deg);opacity:0}
  60%{transform:scale(1.18) rotate(3deg)}
  82%{transform:scale(.95) rotate(-1deg)}
  100%{transform:scale(1) rotate(0);opacity:1}
}
@keyframes ea-shake {
  0%,100%{transform:translateX(0)} 18%{transform:translateX(-6px)}
  50%{transform:translateX(6px)} 75%{transform:translateX(-3px)}
}
@keyframes ea-rare-in { from{opacity:0;transform:scale(.88)} to{opacity:1;transform:scale(1)} }
@keyframes ea-glow {
  0%,100%{box-shadow:0 0 18px var(--gc),0 0 36px var(--gc)}
  50%{box-shadow:0 0 40px var(--gc),0 0 80px var(--gc)}
}
</style>
</head>
<body>
<div class="game" id="game">
  <div class="header">
    <div>
      <div class="title">감정 연금술</div>
      <div class="subtitle">두 감정을 탭해 새로운 감정을 발견하세요</div>
    </div>
    <div class="progress-area">
      <div class="count"><span id="count-found">4</span><span>/20</span></div>
      <div class="progress-track"><div id="progress-fill" class="progress-fill" style="width:20%"></div></div>
      <button class="reset-btn" id="reset-btn">처음부터</button>
    </div>
  </div>
  <div id="grid" class="grid"></div>
  <div class="complete-banner" id="complete-banner">
    <div class="ct">모든 감정의 우주가 완성되었어요!</div>
    <div class="cs">20개의 감정을 모두 발견했습니다</div>
  </div>
  <div class="hint-bar">
    <span id="hint-text">감정을 탭해 합성해보세요</span>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button class="action-btn" id="cancel-btn" style="display:none">취소</button>
      <button class="action-btn" id="hint-btn">힌트</button>
    </div>
  </div>
  <div id="level-dots" class="level-dots"></div>
  <div class="rare-overlay" id="rare-overlay">
    <div id="rare-content" class="rare-content"></div>
  </div>
</div>
<script>
var E = {
  joy:      { n:"기쁨",   c:"#EF9F27", lv:1, d:"따뜻하고 밝은 에너지" },
  sad:      { n:"슬픔",   c:"#378ADD", lv:1, d:"마음이 무거운 감각" },
  anger:    { n:"분노",   c:"#E24B4A", lv:1, d:"강렬한 불만의 열기" },
  fear:     { n:"두려움", c:"#AFA9EC", lv:1, d:"위협 앞의 긴장감" },
  wistful:  { n:"아련함", c:"#9FE1CB", lv:2, d:"기쁨과 슬픔이 뒤섞인 감각" },
  excited:  { n:"흥분",   c:"#F0997B", lv:2, d:"고조되는 강렬한 에너지" },
  thrill:   { n:"설렘",   c:"#FAC775", lv:2, d:"두근거리는 기대감" },
  resent:   { n:"억울함", c:"#ED93B1", lv:2, d:"풀리지 않는 부당함" },
  lonely:   { n:"외로움", c:"#85B7EB", lv:2, d:"혼자라는 감각" },
  tension:  { n:"긴장",   c:"#D85A30", lv:2, d:"팽팽한 경계 상태" },
  euphoria: { n:"황홀함", c:"#FCDE5A", lv:2, d:"벅차오르는 극한의 기쁨" },
  gloom:    { n:"우울",   c:"#185FA5", lv:2, d:"짙고 깊은 슬픔" },
  longing:  { n:"그리움", c:"#5DCAA5", lv:3, d:"멀리 있는 것을 향한 마음" },
  passion:  { n:"열정",   c:"#FF6B35", lv:3, d:"뜨겁게 타오르는 몰입" },
  void:     { n:"공허함", c:"#B4B2A9", lv:3, d:"채워지지 않는 빈 감각" },
  happy:    { n:"행복",   c:"#F5C842", lv:3, d:"충만하고 따뜻한 만족감" },
  hurt:     { n:"상처",   c:"#D4537E", lv:3, d:"마음에 남은 깊은 흔적" },
  numb:     { n:"무기력", c:"#707070", lv:3, d:"아무것도 할 수 없는 감각" },
  love:     { n:"사랑",   c:"#FF4D7E", lv:4, d:"가장 깊고 따뜻한 연결" },
  serenity: { n:"평온",   c:"#1D9E75", lv:4, d:"고요하고 완전한 안정" }
};

var TOTAL  = 20;
var START  = ["joy","sad","anger","fear"];
var LV_COL = ["#EF9F27","#9FE1CB","#5DCAA5","#FF4D7E"];
var LV_NM  = ["기본 감정","합성 감정","고차 감정","희귀 감정"];

var RX = [
  ["joy","sad","wistful"],   ["joy","anger","excited"],
  ["joy","fear","thrill"],   ["sad","anger","resent"],
  ["sad","fear","lonely"],   ["anger","fear","tension"],
  ["joy","joy","euphoria"],  ["sad","sad","gloom"],
  ["thrill","wistful","longing"],  ["excited","thrill","passion"],
  ["wistful","lonely","void"],     ["euphoria","thrill","happy"],
  ["resent","lonely","hurt"],      ["tension","gloom","numb"],
  ["passion","longing","love"],    ["longing","happy","serenity"]
];

function findRecipe(a, b) {
  for (var i = 0; i < RX.length; i++) {
    var r = RX[i];
    if ((r[0]===a && r[1]===b) || (r[0]===b && r[1]===a)) return r;
  }
  return null;
}

var discovered = new Set(START);
var selected   = null;
var rareActive = false;
var hintTimer  = null;

function loadProgress() {
  try {
    var s = localStorage.getItem("ea_disc_v2");
    if (s) discovered = new Set(JSON.parse(s));
  } catch(e) {}
}
function saveProgress() {
  try { localStorage.setItem("ea_disc_v2", JSON.stringify(Array.from(discovered))); } catch(e) {}
}

function setHint(text, color, dur) {
  color = color || "#50507A";
  if (dur === undefined) dur = 2800;
  if (hintTimer) clearTimeout(hintTimer);
  var el = document.getElementById("hint-text");
  el.textContent = text;
  el.style.color  = color;
  if (dur > 0) {
    hintTimer = setTimeout(function() {
      el.textContent = "감정을 탭해 합성해보세요";
      el.style.color  = "#50507A";
    }, dur);
  }
}

function createOrb(id) {
  var em  = E[id];
  var c0  = id.charCodeAt(0);
  var c1  = id.charCodeAt(1) || 0;
  var dur = (3 + (c0 % 9) * 0.18).toFixed(2);
  var dly = (-(c1 + c0) % 12 * 0.2).toFixed(2);

  var w = document.createElement("div");
  w.className  = "orb-wrapper";
  w.dataset.id = id;
  w.style.setProperty("--fdur", dur + "s");
  w.style.setProperty("--fdly", dly + "s");

  var circle = document.createElement("div");
  circle.className        = "orb-circle";
  circle.style.background = em.c;
  circle.style.boxShadow  = "0 0 10px " + em.c + "28";

  var name = document.createElement("div");
  name.className   = "orb-name";
  name.textContent = em.n;

  w.appendChild(circle);
  w.appendChild(name);

  if (em.lv > 1) {
    var stars = document.createElement("div");
    stars.className   = "orb-stars";
    stars.textContent = Array(em.lv).join("★");
    w.appendChild(stars);
  }

  w.addEventListener("click", function() { handleTap(id); });
  return w;
}

function createPlaceholder() {
  var el = document.createElement("div");
  el.id = "orb-ph";
  el.className = "orb-placeholder";
  var circ = document.createElement("div");
  circ.className = "orb-placeholder-circle";
  var sp = document.createElement("span");
  sp.textContent = "+";
  circ.appendChild(sp);
  var nm = document.createElement("div");
  nm.className   = "orb-placeholder-name";
  nm.textContent = "미발견";
  el.appendChild(circ);
  el.appendChild(nm);
  return el;
}

function getSorted() {
  var arr = Array.from(discovered);
  arr.sort(function(a, b) {
    if (E[a].lv !== E[b].lv) return E[a].lv - E[b].lv;
    return a.localeCompare(b);
  });
  return arr;
}

function initGrid() {
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  var sorted = getSorted();
  for (var i = 0; i < sorted.length; i++) {
    grid.appendChild(createOrb(sorted[i]));
  }
  if (discovered.size < TOTAL) grid.appendChild(createPlaceholder());
}

function addOrbToGrid(id) {
  var grid = document.getElementById("grid");
  var ph   = document.getElementById("orb-ph");
  if (ph) ph.remove();

  var sorted = getSorted();
  var idx    = sorted.indexOf(id);
  var orb    = createOrb(id);

  orb.style.animation = "ea-pop .55s cubic-bezier(.34,1.56,.64,1) both";
  setTimeout(function() {
    var c0  = id.charCodeAt(0);
    var c1  = id.charCodeAt(1) || 0;
    var dur = (3 + (c0 % 9) * 0.18).toFixed(2);
    var dly = (-(c1 + c0) % 12 * 0.2).toFixed(2);
    orb.style.animation = "";
    orb.style.setProperty("--fdur", dur + "s");
    orb.style.setProperty("--fdly", dly + "s");
  }, 600);

  var children = Array.from(grid.children);
  if (idx < children.length) {
    grid.insertBefore(orb, children[idx]);
  } else {
    grid.appendChild(orb);
  }
  if (discovered.size < TOTAL) grid.appendChild(createPlaceholder());
}

function applySelected(id) {
  selected = id;
  var w = document.querySelector('[data-id="' + id + '"]');
  if (!w) return;
  var c = w.querySelector(".orb-circle");
  var n = w.querySelector(".orb-name");
  c.style.boxShadow  = "0 0 0 2.5px #060611, 0 0 0 4.5px " + E[id].c + ", 0 0 22px " + E[id].c + "90";
  c.style.transform  = "scale(1.14)";
  n.style.color      = E[id].c;
  n.style.fontWeight = "600";
  document.getElementById("cancel-btn").style.display = "";
}

function clearSelected() {
  if (selected) {
    var w = document.querySelector('[data-id="' + selected + '"]');
    if (w) {
      var c = w.querySelector(".orb-circle");
      var n = w.querySelector(".orb-name");
      c.style.boxShadow  = "0 0 10px " + E[selected].c + "28";
      c.style.transform  = "";
      n.style.color      = "#5A5A88";
      n.style.fontWeight = "400";
    }
  }
  selected = null;
  document.getElementById("cancel-btn").style.display = "none";
}

function triggerShake(id) {
  var w = document.querySelector('[data-id="' + id + '"]');
  if (!w) return;
  w.style.animation = "ea-shake .35s ease both";
  setTimeout(function() { w.style.animation = ""; }, 380);
}

function updateProgress() {
  document.getElementById("count-found").textContent = discovered.size;
  document.getElementById("progress-fill").style.width = Math.round(discovered.size / TOTAL * 100) + "%";
}

function initLevelDots() {
  var container = document.getElementById("level-dots");
  container.innerHTML = "";
  for (var lv = 1; lv <= 4; lv++) {
    var items = Object.keys(E).filter(function(k) { return E[k].lv === lv; });
    var sec   = document.createElement("div");
    sec.className = "level-section";

    var label = document.createElement("div");
    label.className   = "level-label";
    label.id          = "lv-lbl-" + lv;
    label.textContent = LV_NM[lv-1] + " 0/" + items.length;
    sec.appendChild(label);

    var row = document.createElement("div");
    row.className = "dots-row";
    for (var j = 0; j < items.length; j++) {
      var d = document.createElement("div");
      d.className = "dot";
      d.id = "dot-" + lv + "-" + j;
      row.appendChild(d);
    }
    sec.appendChild(row);
    container.appendChild(sec);
  }
  updateLevelDots();
}

function updateLevelDots() {
  for (var lv = 1; lv <= 4; lv++) {
    var items = Object.keys(E).filter(function(k) { return E[k].lv === lv; });
    var found = items.filter(function(id) { return discovered.has(id); }).length;
    var label = document.getElementById("lv-lbl-" + lv);
    if (label) {
      label.textContent = LV_NM[lv-1] + " " + found + "/" + items.length;
      label.className   = "level-label" + (found > 0 ? " active" : "");
    }
    for (var j = 0; j < items.length; j++) {
      var dot = document.getElementById("dot-" + lv + "-" + j);
      if (!dot) continue;
      if (j < found) {
        dot.style.background = LV_COL[lv-1];
        dot.style.boxShadow  = "0 0 5px " + LV_COL[lv-1] + "70";
      } else {
        dot.style.background = "#161630";
        dot.style.boxShadow  = "none";
      }
    }
  }
}

function showRare(id) {
  rareActive = true;
  var em      = E[id];
  var overlay = document.getElementById("rare-overlay");
  var content = document.getElementById("rare-content");

  overlay.style.animation = "ea-rare-in .4s ease both";
  overlay.style.display   = "flex";

  var orbEl = document.createElement("div");
  orbEl.className        = "rare-orb-el";
  orbEl.style.background = em.c;
  orbEl.style.setProperty("--gc", em.c + "90");
  orbEl.style.animation  = "ea-pop .7s cubic-bezier(.34,1.56,.64,1) .1s both, ea-glow 2s ease-in-out .8s infinite";

  var badge = document.createElement("div");
  badge.className   = "rare-badge";
  badge.style.color = em.c;
  badge.textContent = "✦  희귀 감정 발견  ✦";

  var nameEl = document.createElement("div");
  nameEl.className   = "rare-name-el";
  nameEl.textContent = em.n;

  var descEl = document.createElement("div");
  descEl.className   = "rare-desc-el";
  descEl.textContent = em.d;

  var closeEl = document.createElement("div");
  closeEl.className   = "rare-close";
  closeEl.textContent = "탭해서 계속하기";

  content.innerHTML = "";
  content.appendChild(orbEl);
  content.appendChild(badge);
  content.appendChild(nameEl);
  content.appendChild(descEl);
  content.appendChild(closeEl);

  overlay.onclick = function() {
    overlay.style.display = "none";
    rareActive = false;
    setHint("✦ 희귀 감정 [" + em.n + "] 발견 — " + em.d, em.c, 4000);
  };
}

function showHint() {
  var possible = RX.filter(function(r) {
    return discovered.has(r[0]) && discovered.has(r[1]) && !discovered.has(r[2]);
  });
  if (possible.length === 0) {
    setHint("모든 가능한 조합을 발견했어요! 더 다양하게 시도해보세요.");
    return;
  }
  var r = possible[Math.floor(Math.random() * possible.length)];
  setHint("힌트: " + E[r[0]].n + " + " + E[r[1]].n + " → ?", "#7070A0", 5000);
}

function handleTap(id) {
  if (rareActive) return;

  if (selected === null) {
    applySelected(id);
    setHint(E[id].n + " 선택됨 — 다른 감정을 탭해 합성하세요", E[id].c, 0);
    return;
  }

  var a = selected, b = id;
  clearSelected();

  var recipe = findRecipe(a, b);

  if (!recipe) {
    triggerShake(a === b ? a : b);
    setHint("이 두 감정의 조합은 알 수 없어요. 다른 조합을 시도해보세요.");
    return;
  }

  var rid   = recipe[2];
  var isNew = !discovered.has(rid);

  if (isNew) {
    discovered.add(rid);
    saveProgress();
    updateProgress();
    addOrbToGrid(rid);
    updateLevelDots();

    if (discovered.size === TOTAL) {
      setTimeout(function() {
        document.getElementById("complete-banner").style.display = "block";
        setHint("모든 감정을 발견했어요!", "#EF9F27", 0);
      }, 800);
    } else if (E[rid].lv === 4) {
      setTimeout(function() { showRare(rid); }, 300);
    } else {
      setHint("✨ 새 감정 발견 — " + E[rid].n + " : " + E[rid].d, E[rid].c, 3200);
    }
  } else {
    setHint("[" + E[rid].n + "] 는 이미 발견했어요. 다른 조합을 시도해보세요.");
  }
}

function resetGame() {
  if (!confirm("모든 진행상황이 사라집니다. 처음부터 다시 시작할까요?")) return;
  discovered = new Set(START);
  selected   = null;
  rareActive = false;
  document.getElementById("rare-overlay").style.display    = "none";
  document.getElementById("complete-banner").style.display = "none";
  saveProgress();
  initGrid();
  updateProgress();
  updateLevelDots();
  setHint("감정을 탭해 합성해보세요", "#50507A", 0);
}

document.addEventListener("DOMContentLoaded", function() {
  loadProgress();
  initGrid();
  updateProgress();
  initLevelDots();
  document.getElementById("reset-btn").addEventListener("click", resetGame);
  document.getElementById("cancel-btn").addEventListener("click", function() {
    clearSelected();
    setHint("감정을 탭해 합성해보세요", "#50507A", 0);
  });
  document.getElementById("hint-btn").addEventListener("click", showHint);
});
</script>
</body>
</html>
